spring.application.name=proposal-generator

# Server Config
server.port=8080

# Database Configuration (Auto-creates the database if it doesn't exist)
spring.datasource.url=jdbc:mysql://localhost:3306/proposal_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Gemini API Integration
# Set this as an environment variable before running:
#   Windows:  set GEMINI_API_KEY=your_key_here
#   Linux:    export GEMINI_API_KEY=your_key_here
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent